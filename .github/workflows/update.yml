name: update

on:
  schedule:
    # Every 6 hours (UTC) per AGENTS.md §9.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update
      cancel-in-progress: false

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch RSS
        continue-on-error: true
        run: python scripts/fetch_rss.py --out data/raw/rss.json

      - name: Fetch GitHub releases
        continue-on-error: true
        run: python scripts/fetch_github.py --out data/raw/github.json

      - name: Fetch Hugging Face
        continue-on-error: true
        run: python scripts/fetch_hf.py --out data/raw/hf.json

      - name: Fetch fal.ai
        continue-on-error: true
        run: python scripts/fetch_fal.py --out data/raw/fal.json

      - name: Classify RSS entries
        timeout-minutes: 10
        run: |
          mkdir -p data/classified
          python scripts/classify.py --in data/raw/rss.json --out data/classified/rss.json

      - name: Merge RSS classifications into releases.json
        run: python scripts/merge_releases.py --in data/classified/rss.json

      - name: Merge GitHub releases into releases.json
        continue-on-error: true
        run: python scripts/merge_releases.py --in data/raw/github.json

      - name: Merge Hugging Face into releases.json
        continue-on-error: true
        run: python scripts/merge_releases.py --in data/raw/hf.json

      - name: Merge fal.ai into releases.json
        continue-on-error: true
        run: python scripts/merge_releases.py --in data/raw/fal.json

      - name: Compute predictions
        run: python scripts/predict.py

      - name: Render HTML
        run: python scripts/render.py

      - name: Upload error log (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: errors-log
          path: logs/errors.jsonl
          if-no-files-found: ignore

      - name: Commit updated data and HTML
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/releases.json data/predictions.json docs/index.html
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: update releases and predictions (${ts})"
          git push origin HEAD:${GITHUB_REF_NAME}
